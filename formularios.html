<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        body { font-family: sans-serif; padding: 20px; }
        fieldset { margin-bottom: 20px; border: 1px solid #ccc; padding: 15px; }
        label { display: inline-block; margin-bottom: 5px; }
        
        input[type="text"],
        input[type="email"],    
        input[type="password"],
        select,
        textarea {
            padding: 8px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px;
            display: block;
            box-sizing: border-box;
        }
        #mensagem-senha, #mensagem-senha2 { font-size: 0.9em; margin-top: 5px; display: block; }
        #mensagem-senha { color: red; }
        #mensagem-senha2 { color: red; }
        .btn-olho { background: none; border: none; cursor: pointer; padding: 5px; }
    </style>

    <script>
        function verSenha() {
            let senhaInput = document.getElementById("senha");
            let icone = document.getElementById("icone-olho");
            
            if (senhaInput.type === "password") {
                senhaInput.type = "text";
                icone.classList.replace("bi-eye", "bi-eye-slash");
            } else {
                senhaInput.type = "password";
                icone.classList.replace("bi-eye-slash", "bi-eye");
            }
        }

        function senhaForte() {
            let senhaValue = document.getElementById("senha").value;
            let msgSpan = document.getElementById("mensagem-senha");
            let campoConfirmacao = document.getElementById("senha2");
            
            let testeNum = /(?=.*\d)/;
            let testMin = /(?=.*[a-z])/;
            let testMai = /(?=.*[A-Z])/;
            let testEsp = /(?=.*[!@#$%^&*()\-+])/;
            let testTam = /.{8,}/;

            let mensagens = [];

            if (!testeNum.test(senhaValue)) mensagens.push("um número");
            if (!testMin.test(senhaValue)) mensagens.push("uma letra minúscula");
            if (!testMai.test(senhaValue)) mensagens.push("uma letra maiúscula");
            if (!testEsp.test(senhaValue)) mensagens.push("um caractere especial");
            if (!testTam.test(senhaValue)) mensagens.push("no mínimo 8 caracteres");

            if (mensagens.length > 0) {
                msgSpan.style.color = "red";
                msgSpan.innerHTML = "A senha deve conter: " + mensagens.join(", ") + ".";
                campoConfirmacao.disabled = true; // Bloqueia se não for forte
            } else {
                msgSpan.style.color = "green";
                msgSpan.innerHTML = "Senha forte!";
                campoConfirmacao.disabled = false; // Desbloqueia se for forte
            }
            // Sempre que mudar a senha principal, revalida a igualdade
            senhaIgual();
        }

        function senhaIgual() {
            let senha1 = document.getElementById("senha").value;
            let senha2 = document.getElementById("senha2").value;
            let msgSpan = document.getElementById("mensagem-senha2");
            let btnEnviar = document.getElementById("enviar");

            if (senha1 === senha2 && senha2 !== "") {
                msgSpan.style.color = "green";
                msgSpan.innerHTML = "As senhas coincidem!";
                btnEnviar.disabled = false;
            } else {
                msgSpan.style.color = "red";
                msgSpan.innerHTML = "As senhas não coincidem.";
                btnEnviar.disabled = true;
            }
        }
    </script>
</head>
<body>
    <form action="https://jkorpela.fi/cgi-bin/echo.cgi" method="post">

        <fieldset>
            <legend>Dados Pessoais</legend>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Nome">
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Email">
        </fieldset>
        
        <fieldset>
            <legend>Dados de Acesso</legend>   
            <input type="radio" id="aluno" name="tipo" value="Aluno">
            <label for="aluno">Aluno</label>
            <input type="radio" id="professor" name="tipo" value="Professor">
            <label for="professor">Professor</label>
            
            <br><br>
            
            <label for="senha">Senha:</label>
            <div style="display: flex; align-items: center;">
                <input onkeyup="senhaForte()" type="password" id="senha" name="senha"> 
                <button type="button" onclick="verSenha()" class="btn-olho">
                    <i id="icone-olho" class="bi bi-eye"></i>
                </button>
            </div>
            <span id="mensagem-senha"></span>

            <br>
            <label for="senha2">Confirmar Senha:</label>
            <input onkeyup="senhaIgual()" type="password" id="senha2" name="senha2" disabled>
            <span id="mensagem-senha2"></span>
        </fieldset>
        
        <fieldset>
            <legend>Preferências</legend>
            <input type="checkbox" id="promo" name="promo" value="aceito">
            <label for="promo">Desejo receber promoções</label>
            
            <textarea name="msg" id="msg" placeholder="Digite sua mensagem..."></textarea>
            
            <label for="nivel">Nível:</label>
            <select name="nivel" id="nivel" required>
                <option value="">Selecione seu nível</option>
                <option value="iniciante">Iniciante</option>
                <option value="intermediario">Intermediário</option>
                <option value="avancado">Avançado</option>    
            </select>
        </fieldset>

        <input type="reset" value="Limpar" onclick="document.getElementById('enviar').disabled = true;">
        <input type="submit" value="Cadastrar" disabled id="enviar">
    </form>
</body>
</html>
