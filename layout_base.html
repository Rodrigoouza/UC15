<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>layout base</title>

    <style> 
    
body{ 
    margin: 0;
}
     header{
        margin: 0;
        background-color: grey;
        display: flex;

    
    }   

h1{
    background-color:blanchedalmond;
    margin: 0;
    text-align: center;
    margin: auto;
}

img{
    height: 250px;
}

ul{
    display: flex;
    list-style-type: none;
    margin: 0;
    padding: 0;
    justify-content: space-around;
}

li{
    flex-grow: 1;
}

a{
    padding: 10px;
    color: #005c91;
    display: block;
    text-align: center;
    text-decoration: none;

}

a:visited {
    color: #005c91;
}

a:hover {
    color: #bbff00;
}

a:active{
 color: #009118;
}
 </style> 

</head>
<body>

      <img src="Midias/migey mousse.jpg" alt="mickey mouse">
