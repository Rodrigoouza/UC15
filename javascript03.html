<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplos de JavaScript</title>
</head>
<body>
    
    <h1>Passagem de Parâmetros nas Funções</h1>
    <p id="tests">Ola Mundo!</p>
    <button onclick="alteraCor('red', 'lightcoral')">vermelho</button>
    <button onclick="alteraCor('green', 'lightgreen')">verde</button>
    <script>
        function alteraCor(cor, fundo){
            document.getElementById("tests").style.color = cor;
            document.getElementById("tests").style.backgroundColor = fundo;
        }
    </script>

    <h2>Exemplo 2</h2>
    <p id="teste2">Ola Mundo!</p>
    <form>
        <input onchange="alteraCor2(this.value)" type="color" id="corTexto">
    </form>
    <script>
        function alteraCor2(cor){
            document.getElementById("teste2").style.color = cor;
        }
    </script>

<h2>Exemplo 3</h2>  
<form>
<input type="range" oninput="pegaValor(this.value)">
<input type="text" id="tamanho" readonly >
</form> 
<script>
    function pegaValor(num){
        document.getElementById("tamanho").value = num;
    }
</script>

<h1>Estruturas de repetição</h1>
<button onclick="repeticao()">Executar repetição</button>
    <script>
        function repeticao(){
        let resposta = prompt("Você tem uma divida. Vai pagar? (S ou N)");
        while(resposta!="s" && resposta!="S"){
            resposta = prompt("Você tem uma divida. Vai pagar? (S ou N)");
        }
         alert("Obrigado por pagar sua divida!");
        }
    </script>

<h2>For</h2>
<button onclick="repeticao2()">Executar repetição</button>
    <ul id="lista"></ul>

    <script>
        function repeticao2(){
            let conteudo = "";
            for(let i=0; i <= 500; i++){
                conteudo += "<li>" + i + "</li>";
            }
            document.getElementById("lista").innerHTML = conteudo;
        }
    </script>
    
    <h1>Vetores ( ou Arrays )</h1>
    <ul id="listaFrutas"></ul>
    
    <script>
    let frutas = ["banana", "maça", "uva", "laranja", "abacaxi", "melancia", "manga", "pera", "kiwi", "cereja"]; 
        let conteudoFrutas = "";
        for(let i=0; i < frutas.length; i++){
            conteudoFrutas += "<li>" + frutas[i] + "</li>";
        }
        document.getElementById("listaFrutas").innerHTML = conteudoFrutas;
    


    // document.getElementById("listaFrutas").innerHTML = frutas[0]; // Acessando o primeiro elemento do array
//     "<li>" + frutas[0] + "</li>"

//     "<li>" + frutas[2] + "</li>"
//     "<li>" + frutas[3] + "</li>"
    
    </script>
    
</body>
</html>
