<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplos de JavaScript</title>
</head>
<body>
    <h1>exemplos de javascript</h1>
    <h2>alterando o conteudo de um elemento</h2>
    
    <p id="mensagem01"> </p>

    <h3>via seletor script</h3>
    
    <script>
        document.getElementById('mensagem01').innerText = 'Olá mundo';
    </script>

    <button onclick="document.getElementById('mensagem01').innerText = 'Olá mundo via onclick';">Clique aqui</button>
    <p id="mensagem01"></p>

    <h3> via atributo onclik</h3>

    <script>
    function exibirMensagem(){
        document.getElementById('mensagem01').innerText = 'Olá mundo via onclick';
    }
    
    </script>

    <h3>via atributo função</h3>
<button onclick="exibirMensagem()">click aqui</button>

<script>
    function exibirMensagem(){
        document.getElementById('mensagem01').innerText = 'Olá mundo via função';
    }
</script>

<h3>Via arquivo externo</h3>
<button onclick="exibirMensagem2()">click aqui</button>
<script>
    function exibirMensagem2() {
    document.getElementById('mensagem01').innerText = 'ola mundo via arquivo exerno'
}
</script>
<h2>Alterando um atributo</h2>
<button onclick="liga()">liga</button>
<img src="Midias/off.gif" alt="" id="lamp">
<script>
    function liga() {
        document.getElementById('lamp').src = 'Midias/on.gif';
    }
</script>
<button onclick="desliga()">desliga</button>
<script>
    function desliga() {
        document.getElementById('lamp').src = 'Midias/off.gif';
    }
</script>

<h3>Alterando a Formatação</h3>
<button onclick="formata()">vermelho</button>
<script>
    function formata() {
        document.getElementById('titulo').style.color = 'red';
        document.getElementById('titulo').style.backgroundColor = 'yellow';
    }
</script>

<h3>Tema Escuro</h3>
<button onclick="temaEscuro()">Tema Escuro</button>
<script>
    function temaEscuro() {
        document.body.style.backgroundColor = 'black';
        document.body.style.color = 'white';
    }
</script>

<h3>tema claro</h3>
<button onclick="temaClaro()">Tema Claro</button>
<script>
    function temaClaro() {
        document.body.style.backgroundColor = 'white';
        document.body.style.color = 'black';
    }
</script>
</body>
</html>
