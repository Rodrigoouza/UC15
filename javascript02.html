<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Mensagem via JavaScript</h1>
    <h2>Via inserção</h2>
<p id="msg01"></p>
<button onclick="document.getElementById('msg01').innerText = 'menseagem inserida via JavaScript'">inserir Mensagem</button>


<h2>Via alerta</h2>
<button onclick="alert('Esta é uma mensagem via JavaScript!')">Mostrar Mensagem</button>

<h2>via console</h2>
<button onclick="console.log('Esta é uma mensagem via console!')">Mostrar Mensagem</button>

<h2>Via escrita direta</h2>
<button onclick="document.write('Esta é uma mensagem via escrita direta via JavaScript!')">Mostrar Mensagem</button>

<h2>via prompt</h2>
<button onclick="var mensagem = prompt('Digite uma mensagem:')"> Exibir prompt</button>

<h2>Variáveis em JavaScript</h2>
<button onclick="mensagem()">Exibir Variável</button>
<script>
    function mensagem(){
        let nome;
        nome =prompt("Digite seu nome:");
        alert( "bom dia, " + nome);
    }
    
</script>

</body>
</html>
