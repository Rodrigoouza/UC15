<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slideshow</title>
<style>
    .container{
    position: relative;
    margin: auto;
        width: 80%;
    }
    .meuSlide img{
        width: 100%; 
       
    } 
    .numero{
        position: absolute;   
        top: 0;
        left: 0;
        padding: 8px 12px;
        color: #f2f2f2;
        font-size: 12px;
    }
    .texto{
        position: absolute;   
        bottom: 8px;
        width: 100%;
        text-align: center;
        padding: 8px 12px;
        color: #f2f2f2;
        width: 100%;
        font-size: 15px;
    }
    .anterior, .proximo{
        position: absolute;
        top: 50%;
        width: auto;
        font-weight: bold;
        font-size: 18px;
        color: #f2f2f2;
        padding: 16px;
        transform: translateY(-50%);
    }
</style>
</head>
<body>
    <div class="container">
        <div class="meuSlide">
            <div class="numero">1 / 3</div>
            <img src="Midias/img01.jpg" style="width:100%">
            <div class="texto">Slideshow</div>
        </div>
        <a class="anterior">&#10094;</a>
        <a class="proximo">&#10095;</a>
    </div>



</body>
</html>
